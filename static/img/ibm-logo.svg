<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" width="200" height="80" preserveAspectRatio="xMidYMid meet">
  <style>
    .bar { fill: #FFFFFF; }
  </style>
  <!-- I -->
  <rect class="bar" x="10" y="0" width="30" height="6"/>
  <rect class="bar" x="10" y="10" width="30" height="6"/>
  <rect class="bar" x="18" y="20" width="14" height="6"/>
  <rect class="bar" x="18" y="30" width="14" height="6"/>
  <rect class="bar" x="18" y="40" width="14" height="6"/>
  <rect class="bar" x="18" y="50" width="14" height="6"/>
  <rect class="bar" x="10" y="60" width="30" height="6"/>
  <rect class="bar" x="10" y="70" width="30" height="6"/>
  
  <!-- B -->
  <rect class="bar" x="50" y="0" width="45" height="6"/>
  <rect class="bar" x="50" y="10" width="50" height="6"/>
  <rect class="bar" x="58" y="20" width="14" height="6"/>
  <rect class="bar" x="80" y="20" width="14" height="6"/>
  <rect class="bar" x="58" y="30" width="34" height="6"/>
  <rect class="bar" x="58" y="40" width="34" height="6"/>
  <rect class="bar" x="58" y="50" width="14" height="6"/>
  <rect class="bar" x="80" y="50" width="18" height="6"/>
  <rect class="bar" x="50" y="60" width="50" height="6"/>
  <rect class="bar" x="50" y="70" width="45" height="6"/>
  
  <!-- M - Classic IBM 8-bar style -->
  <rect class="bar" x="110" y="0" width="80" height="6"/>
  <rect class="bar" x="110" y="10" width="80" height="6"/>
  <rect class="bar" x="118" y="20" width="14" height="6"/>
  <rect class="bar" x="140" y="20" width="20" height="6"/>
  <rect class="bar" x="168" y="20" width="14" height="6"/>
  <rect class="bar" x="118" y="30" width="14" height="6"/>
  <rect class="bar" x="145" y="30" width="10" height="6"/>
  <rect class="bar" x="168" y="30" width="14" height="6"/>
  <rect class="bar" x="118" y="40" width="14" height="6"/>
  <rect class="bar" x="168" y="40" width="14" height="6"/>
  <rect class="bar" x="118" y="50" width="14" height="6"/>
  <rect class="bar" x="168" y="50" width="14" height="6"/>
  <rect class="bar" x="110" y="60" width="14" height="6"/>
  <rect class="bar" x="176" y="60" width="14" height="6"/>
  <rect class="bar" x="110" y="70" width="14" height="6"/>
  <rect class="bar" x="176" y="70" width="14" height="6"/>
</svg>
