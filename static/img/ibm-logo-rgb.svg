    .blue { fill: #1F70C1; }
  </style>
  <!-- I (Red) -->
  <rect class="red" x="10" y="0" width="30" height="6"/>
  <rect class="red" x="10" y="10" width="30" height="6"/>
  <rect class="red" x="18" y="20" width="14" height="6"/>
  <rect class="red" x="18" y="30" width="14" height="6"/>
