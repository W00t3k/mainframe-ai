  <rect class="green" x="50" y="60" width="50" height="6"/>
  <rect class="green" x="50" y="70" width="45" height="6"/>
  
  <!-- M (Blue) - Classic IBM 8-bar style -->
  <rect class="blue" x="110" y="0" width="80" height="6"/>
  <rect class="blue" x="110" y="10" width="80" height="6"/>
  <rect class="blue" x="118" y="20" width="14" height="6"/>
