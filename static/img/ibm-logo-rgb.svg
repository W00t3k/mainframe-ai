  <rect class="blue" x="168" y="20" width="14" height="6"/>
  <rect class="blue" x="118" y="30" width="14" height="6"/>
  <rect class="blue" x="145" y="30" width="10" height="6"/>
  <rect class="blue" x="168" y="30" width="14" height="6"/>
  <rect class="blue" x="118" y="40" width="14" height="6"/>
