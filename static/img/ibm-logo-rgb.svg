  <rect class="blue" x="118" y="50" width="14" height="6"/>
  <rect class="blue" x="168" y="50" width="14" height="6"/>
  <rect class="blue" x="110" y="60" width="14" height="6"/>
  <rect class="blue" x="176" y="60" width="14" height="6"/>
  <rect class="blue" x="110" y="70" width="14" height="6"/>
  <rect class="blue" x="176" y="70" width="14" height="6"/>
</svg>
