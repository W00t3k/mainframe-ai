<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="4" fill="#0a0e14"/>
  <!-- "I" in IBM stripe style (8 horizontal bars) -->
  <g fill="#00ff41">
    <!-- I -->
    <rect x="3" y="4" width="6" height="1.8" rx="0.3"/>
    <rect x="3" y="7.2" width="6" height="1.8" rx="0.3"/>
    <rect x="4.5" y="10.4" width="3" height="1.8" rx="0.3"/>
    <rect x="4.5" y="13.6" width="3" height="1.8" rx="0.3"/>
    <rect x="4.5" y="16.8" width="3" height="1.8" rx="0.3"/>
    <rect x="4.5" y="20" width="3" height="1.8" rx="0.3"/>
    <rect x="3" y="23.2" width="6" height="1.8" rx="0.3"/>
    <rect x="3" y="26.4" width="6" height="1.8" rx="0.3"/>
    <!-- B -->
    <rect x="11" y="4" width="8" height="1.8" rx="0.3"/>
    <rect x="11" y="7.2" width="8.5" height="1.8" rx="0.3"/>
    <rect x="11" y="10.4" width="3" height="1.8" rx="0.3"/>
    <rect x="16" y="10.4" width="3.5" height="1.8" rx="0.3"/>
    <rect x="11" y="13.6" width="8" height="1.8" rx="0.3"/>
    <rect x="11" y="16.8" width="8.5" height="1.8" rx="0.3"/>
    <rect x="11" y="20" width="3" height="1.8" rx="0.3"/>
    <rect x="16" y="20" width="3.5" height="1.8" rx="0.3"/>
    <rect x="11" y="23.2" width="8.5" height="1.8" rx="0.3"/>
    <rect x="11" y="26.4" width="8" height="1.8" rx="0.3"/>
    <!-- M (broken/glitched - the "break" pun) -->
    <rect x="22" y="4" width="2" height="1.8" rx="0.3" opacity="0.9"/>
    <rect x="27" y="4" width="2" height="1.8" rx="0.3" opacity="0.9"/>
    <rect x="22" y="7.2" width="2.5" height="1.8" rx="0.3"/>
    <rect x="26.5" y="7.2" width="2.5" height="1.8" rx="0.3"/>
    <rect x="22" y="10.4" width="3" height="1.8" rx="0.3"/>
    <rect x="26" y="10.4" width="3" height="1.8" rx="0.3"/>
    <rect x="22" y="13.6" width="7" height="1.8" rx="0.3"/>
    <!-- glitch: M breaks apart here -->
    <rect x="22" y="16.8" width="3.2" height="1.8" rx="0.3" opacity="0.7"/>
    <rect x="26.8" y="17.3" width="2.2" height="1.3" rx="0.3" opacity="0.4" fill="#ff3333"/>
    <rect x="22" y="20" width="2" height="1.8" rx="0.3" opacity="0.5"/>
    <rect x="27" y="20.5" width="2" height="1.3" rx="0.3" opacity="0.3" fill="#ff3333"/>
    <rect x="22" y="23.2" width="2" height="1.8" rx="0.3" opacity="0.3"/>
    <rect x="28" y="23.7" width="1" height="0.8" rx="0.3" opacity="0.15" fill="#ff3333"/>
    <!-- M bottom: gone (broken) -->
  </g>
  <!-- terminal cursor blink -->
  <rect x="25" y="26.4" width="4" height="1.8" rx="0.3" fill="#00ff41" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.1;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
