<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="ibmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0062ff"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="20" fill="#0a0a0f"/>

  <!-- IBM-style stripes pattern -->
  <g fill="url(#ibmGrad)" filter="url(#glow)">
    <!-- I -->
    <rect x="25" y="50" width="30" height="6"/>
    <rect x="25" y="62" width="30" height="6"/>
    <rect x="35" y="74" width="10" height="6"/>
    <rect x="35" y="86" width="10" height="6"/>
    <rect x="35" y="98" width="10" height="6"/>
    <rect x="25" y="110" width="30" height="6"/>
    <rect x="25" y="122" width="30" height="6"/>

    <!-- B -->
    <rect x="65" y="50" width="35" height="6"/>
    <rect x="65" y="62" width="35" height="6"/>
    <rect x="65" y="74" width="10" height="6"/>
    <rect x="90" y="74" width="10" height="6"/>
    <rect x="65" y="86" width="30" height="6"/>
    <rect x="65" y="98" width="10" height="6"/>
    <rect x="92" y="98" width="10" height="6"/>
    <rect x="65" y="110" width="40" height="6"/>
    <rect x="65" y="122" width="38" height="6"/>

    <!-- M -->
    <rect x="115" y="50" width="10" height="6"/>
    <rect x="155" y="50" width="10" height="6"/>
    <rect x="115" y="62" width="15" height="6"/>
    <rect x="150" y="62" width="15" height="6"/>
    <rect x="115" y="74" width="10" height="6"/>
    <rect x="132" y="74" width="16" height="6"/>
    <rect x="155" y="74" width="10" height="6"/>
    <rect x="115" y="86" width="10" height="6"/>
    <rect x="137" y="86" width="6" height="6"/>
    <rect x="155" y="86" width="10" height="6"/>
    <rect x="115" y="98" width="10" height="6"/>
    <rect x="155" y="98" width="10" height="6"/>
    <rect x="115" y="110" width="10" height="6"/>
    <rect x="155" y="110" width="10" height="6"/>
    <rect x="115" y="122" width="10" height="6"/>
    <rect x="155" y="122" width="10" height="6"/>
  </g>

  <!-- z/OS text -->
  <text x="100" y="160" text-anchor="middle" fill="#00d4ff" font-family="monospace" font-size="20" font-weight="bold" filter="url(#glow)">z/OS</text>

  <!-- AI badge -->
  <circle cx="170" cy="170" r="18" fill="url(#ibmGrad)" opacity="0.9"/>
  <text x="170" y="176" text-anchor="middle" fill="#0a0a0f" font-family="monospace" font-size="14" font-weight="bold">AI</text>
</svg>
