{% extends "base.html" %}

{% block title %}Tutorials - Mainframe AI Assistant{% endblock %}

{% block page_styles %}
<link rel="stylesheet" href="/static/css/pages/tutorials.css?v=1">
{% endblock %}

{% block body %}
<div class="tut-page">
    <!-- Header -->
    <header class="tut-header">
        <a href="/" class="home-btn" title="Home">
            <img src="/static/img/ibm-logo-official.svg" alt="IBM" class="ibm-logo">
        </a>
        <h1>Tutorial Library</h1>
        <nav style="display:flex; gap:4px; margin-left:auto;">
            <a href="/walkthrough" style="padding:5px 14px; font-size:12px; font-family:'IBM Plex Mono',monospace; background:transparent; border:1px solid var(--border-color); color:var(--ibm-cyan); border-radius:3px; text-decoration:none;">Walkthrough</a>
            <a href="/tutorials" style="padding:5px 14px; font-size:12px; font-family:'IBM Plex Mono',monospace; background:rgba(100,150,255,0.2); border:1px solid var(--ibm-cyan); color:#fff; border-radius:3px; text-decoration:none;">Tutorials</a>
            <a href="/tutor" style="padding:5px 14px; font-size:12px; font-family:'IBM Plex Mono',monospace; background:transparent; border:1px solid var(--border-color); color:var(--ibm-cyan); border-radius:3px; text-decoration:none;">AI Tutor</a>
            <a href="/labs" style="padding:5px 14px; font-size:12px; font-family:'IBM Plex Mono',monospace; background:transparent; border:1px solid var(--border-color); color:var(--ibm-cyan); border-radius:3px; text-decoration:none;">Labs</a>
        </nav>
    </header>

    <!-- Category Filters -->
    <div class="tut-filters" id="tutFilters">
        <button class="tut-filter active" data-cat="all">All</button>
        <button class="tut-filter" data-cat="getting-started">Getting Started</button>
        <button class="tut-filter" data-cat="tso">TSO</button>
        <button class="tut-filter" data-cat="ispf">ISPF</button>
        <button class="tut-filter" data-cat="jcl">JCL</button>
        <button class="tut-filter" data-cat="cobol">COBOL</button>
        <button class="tut-filter" data-cat="kicks">KICKS / CICS</button>
        <button class="tut-filter" data-cat="datasets">Datasets</button>
        <button class="tut-filter" data-cat="utilities">Utilities</button>
    </div>

    <!-- Tutorial Grid -->
    <div class="tut-grid" id="tutGrid"></div>
</div>
{% endblock %}

{% block page_scripts %}
<script>
const TUTORIALS = [
    // ── Getting Started ──
    {
        id: 'login',
        cat: 'getting-started',
        icon: '>>',
        title: 'First Login to MVS',
        difficulty: 'beginner',
        desc: 'Connect to the TK5 mainframe via TN3270 and log in to TSO for the first time.',
        steps: [
            {
                title: 'Connect to TN3270',
                text: 'Use the web terminal or any TN3270 client to connect:',
                cmd: 'localhost:3270',
                note: 'The web app auto-connects on startup. You can also use <b>c3270</b>, <b>x3270</b>, or <b>wc3270</b>.'
            },
            {
                title: 'VTAM Logon Screen',
                text: 'You should see the TK5 VTAM logon screen with "Logon ===>" prompt. Type your application name:',
                cmd: 'TSO'
            },
            {
                title: 'Enter User ID',
                text: 'At the TSO logon panel, enter the default user ID:',
                cmd: 'HERC01',
                note: 'Default password is <b>CUL8TR</b>. Other users: HERC02, HERC03, HERC04.'
            },
            {
                title: 'ISPF Main Menu',
                text: 'After login you\'ll see the ISPF Primary Option Menu. This is your home base. Key options:',
                cmd: '0 - Settings\n1 - Browse\n2 - Edit\n3 - Utilities\n4 - Foreground\n6 - Command\nM - More (TSOAPPLS)',
                note: 'Press <b>PF3</b> (F3) to go back from any panel. Press <b>PF1</b> (F1) for help.'
            }
        ]
    },
    {
        id: 'pf-keys',
        cat: 'getting-started',
        icon: 'Fn',
        title: 'PF Keys & Navigation',
        difficulty: 'beginner',
        desc: 'Learn the essential Program Function keys used on every 3270 screen.',
        steps: [
            {
                title: 'Essential PF Keys',
                text: 'These PF keys work everywhere on the mainframe:',
                cmd: 'PF1  (F1)  = Help\nPF3  (F3)  = Exit / Go Back\nPF7  (F7)  = Scroll Up\nPF8  (F8)  = Scroll Down\nPF10 (F10) = Scroll Left\nPF11 (F11) = Scroll Right\nENTER      = Submit / Confirm\nCLEAR      = Clear Screen\nTAB        = Next Field'
            },
            {
                title: 'Command Line Shortcuts',
                text: 'From any ISPF panel, you can jump directly using the command line at the top:',
                cmd: '=3.4    Jump to Dataset List (ISPF 3.4)\n=M      Jump to More/TSOAPPLS menu\n=X      Exit ISPF entirely\nTSO xx  Run a TSO command from ISPF'
            },
            {
                title: 'ISPF Split Screen',
                text: 'You can split your terminal into two sessions:',
                cmd: 'PF2  (F2)  = Split screen\nPF9  (F9)  = Swap between splits',
                note: 'Very useful for editing in one split and submitting jobs in another.'
            }
        ]
    },

    // ── TSO ──
    {
        id: 'tso-commands',
        cat: 'tso',
        icon: 'TS',
        title: 'TSO Commands',
        difficulty: 'beginner',
        desc: 'Learn fundamental TSO commands at the READY prompt.',
        steps: [
            {
                title: 'Get to the READY prompt',
                text: 'From ISPF, press PF3 repeatedly until you see the TSO READY prompt. Or type on the ISPF command line:',
                cmd: '=X'
            },
            {
                title: 'Basic TSO Commands',
                text: 'At the READY prompt, try these commands:',
                cmd: 'TIME              Display current time and date\nLISTCAT           List cataloged datasets\nLISTDS \'HERC01.*\' List your datasets\nPROFILE           Show your TSO profile\nSTATUS            Show background job status'
            },
            {
                title: 'Dataset Commands',
                text: 'Work with datasets from TSO:',
                cmd: 'ALLOCATE DATASET(\'HERC01.TEST.DATA\') NEW SPACE(1,1) TRACKS RECFM(F,B) LRECL(80) BLKSIZE(3120)\nDELETE \'HERC01.TEST.DATA\'\nRENAME \'HERC01.OLD\' \'HERC01.NEW\''
            },
            {
                title: 'Return to ISPF',
                text: 'To get back to ISPF:',
                cmd: 'ISPF'
            }
        ]
    },
    {
        id: 'tso-exec',
        cat: 'tso',
        icon: 'EX',
        title: 'Running CLISTs & REXX',
        difficulty: 'intermediate',
        desc: 'Execute CLISTs and REXX execs from TSO.',
        steps: [
            {
                title: 'Run a CLIST',
                text: 'CLISTs are TSO command procedures stored in PDS members. Execute one:',
                cmd: 'EXEC \'SYS1.CMDPROC(membername)\''
            },
            {
                title: 'Inline CLIST',
                text: 'You can write a quick CLIST directly. First allocate a dataset:',
                cmd: 'ALLOCATE DATASET(\'HERC01.CLIST\') NEW SPACE(1,1) TRACKS RECFM(F,B) LRECL(80) BLKSIZE(3120) DSORG(PO) DIR(5)'
            },
            {
                title: 'Edit and Run',
                text: 'In ISPF Edit (option 2), create a member in your CLIST dataset:',
                cmd: 'PROC 0\nWRITE HELLO FROM MVS!\nWRITE THE TIME IS &SYSTIME\nWRITE THE DATE IS &SYSDATE',
                note: 'Save the member, then execute: <b>EXEC \'HERC01.CLIST(HELLO)\'</b>'
            },
            {
                title: 'BREXX (REXX for MVS)',
                text: 'TK5 includes BREXX. Create a REXX exec:',
                cmd: '/* REXX */\nSAY "Hello from BREXX on MVS 3.8j!"\nSAY "Today is" DATE()\nSAY "Time is" TIME()\nEXIT 0',
                note: 'Store in a PDS with RECFM=FB LRECL=80 and execute with <b>EXEC</b> command.'
            }
        ]
    },

    // ── ISPF ──
    {
        id: 'ispf-datasets',
        cat: 'ispf',
        icon: '34',
        title: 'Dataset Management (3.4)',
        difficulty: 'beginner',
        desc: 'Use ISPF option 3.4 to browse, edit, and manage datasets.',
        steps: [
            {
                title: 'Open Dataset List',
                text: 'From any ISPF panel, jump to the dataset list utility:',
                cmd: '=3.4'
            },
            {
                title: 'List Your Datasets',
                text: 'In the "Dsname Level" field, enter your high-level qualifier:',
                cmd: 'HERC01',
                note: 'You can use wildcards: <b>SYS1.*</b> or <b>HERC01.**</b>'
            },
            {
                title: 'Line Commands',
                text: 'Place cursor on a dataset and type these line commands:',
                cmd: 'B = Browse (read-only)\nE = Edit\nI = Info (attributes)\nD = Delete\nR = Rename\nS = Select (for PDS members)\nV = VSAM info'
            },
            {
                title: 'Allocate New Dataset',
                text: 'From ISPF option 3.2, you can allocate a new dataset interactively.',
                cmd: '=3.2',
                note: 'Choose option <b>A</b> for Allocate. Set RECFM=FB, LRECL=80 for source code.'
            }
        ]
    },
    {
        id: 'ispf-edit',
        cat: 'ispf',
        icon: 'ED',
        title: 'ISPF Editor Commands',
        difficulty: 'beginner',
        desc: 'Master the ISPF editor with line commands and primary commands.',
        steps: [
            {
                title: 'Open the Editor',
                text: 'From ISPF, option 2 opens the editor. Enter a dataset name:',
                cmd: 'HERC01.JCL(MYJOB)',
                note: 'If the member doesn\'t exist, it will be created when you save.'
            },
            {
                title: 'Line Commands',
                text: 'Type these in the line number area (far left):',
                cmd: 'I   = Insert line after\nIn  = Insert n blank lines\nD   = Delete line\nDn  = Delete n lines\nC   = Copy line\nCn  = Copy n lines\nM   = Move line\nMn  = Move n lines\nR   = Repeat line\nRn  = Repeat n times\nA   = After (paste target)\nB   = Before (paste target)'
            },
            {
                title: 'Primary Commands',
                text: 'Type these on the command line at the top:',
                cmd: 'SAVE    = Save the file\nCANCEL  = Exit without saving\nFIND xx = Search for text\nCHANGE xx yy = Find and replace\nSUBMIT  = Submit as JCL job\nCOPY    = Copy from another dataset\nCOLS    = Show column ruler\nNUMBER  = Toggle line numbers'
            },
            {
                title: 'Block Commands',
                text: 'Use paired commands to select blocks:',
                cmd: 'CC / CC = Copy block (mark start & end)\nDD / DD = Delete block\nMM / MM = Move block\nA or B  = Paste target (After/Before)',
                note: 'Mark the first line with CC, scroll down, mark the last line with CC, then place A or B at the target.'
            }
        ]
    },

    // ── JCL ──
    {
        id: 'jcl-hello',
        cat: 'jcl',
        icon: 'JC',
        title: 'Your First JCL Job',
        difficulty: 'beginner',
        desc: 'Write, submit, and check output for a simple JCL job.',
        steps: [
            {
                title: 'Create JCL Dataset',
                text: 'First, allocate a PDS to store your JCL:',
                cmd: 'TSO ALLOCATE DATASET(\'HERC01.JCL\') NEW SPACE(5,5) TRACKS RECFM(F,B) LRECL(80) BLKSIZE(3120) DSORG(PO) DIR(10)',
                note: 'Run this from the ISPF command line with TSO prefix, or at the READY prompt without TSO.'
            },
            {
                title: 'Write Hello World JCL',
                text: 'Edit the dataset and create member HELLO:',
                cmd: '//HELLO   JOB (ACCT),\'HELLO WORLD\',\n//        CLASS=A,MSGCLASS=A,MSGLEVEL=(1,1)\n//STEP1   EXEC PGM=IEBGENER\n//SYSPRINT DD SYSOUT=A\n//SYSIN    DD DUMMY\n//SYSUT1   DD *\nHELLO FROM MVS 3.8j!\nTHIS IS MY FIRST JCL JOB.\n/*\n//SYSUT2   DD SYSOUT=A\n//',
                note: 'JCL starts in column 1. The // in columns 1-2 marks JCL statements. The /* marks end of in-stream data.'
            },
            {
                title: 'Submit the Job',
                text: 'From the ISPF editor, type on the command line:',
                cmd: 'SUBMIT'
            },
            {
                title: 'Check Job Output',
                text: 'Go to ISPF option 3.8 (OUTLIST) to view your job output:',
                cmd: '=3.8',
                note: 'Look for your job name HELLO. Use <b>S</b> to select and view the output.'
            }
        ]
    },
    {
        id: 'jcl-sort',
        cat: 'jcl',
        icon: 'SR',
        title: 'Sort/Merge Utility',
        difficulty: 'intermediate',
        desc: 'Use the MVS Sort/Merge utility to sort data in a dataset.',
        steps: [
            {
                title: 'Create Test Data',
                text: 'Create a sequential dataset with some data to sort:',
                cmd: '//MKDATA  JOB (ACCT),\'CREATE DATA\',\n//        CLASS=A,MSGCLASS=A\n//STEP1   EXEC PGM=IEBGENER\n//SYSPRINT DD SYSOUT=A\n//SYSIN    DD DUMMY\n//SYSUT1   DD *\nCHARLIE  30  NYC\nALICE    25  SFO\nBOB      28  LAX\nDAVID    22  CHI\nEVE      35  BOS\n/*\n//SYSUT2   DD DSN=HERC01.SORTDATA,DISP=(NEW,CATLG),\n//         SPACE=(TRK,(1,1)),DCB=(RECFM=FB,LRECL=80,BLKSIZE=3120)\n//'
            },
            {
                title: 'Sort by Name',
                text: 'Submit a sort job to sort the records alphabetically:',
                cmd: '//SORTJOB JOB (ACCT),\'SORT DATA\',\n//        CLASS=A,MSGCLASS=A\n//STEP1   EXEC PGM=SORT\n//SYSOUT   DD SYSOUT=A\n//SORTIN   DD DSN=HERC01.SORTDATA,DISP=SHR\n//SORTOUT  DD SYSOUT=A\n//SYSIN    DD *\n  SORT FIELDS=(1,9,CH,A)\n/*\n//',
                note: '<b>SORT FIELDS=(1,9,CH,A)</b> means: start at position 1, length 9, character type, ascending.'
            }
        ]
    },

    // ── COBOL ──
    {
        id: 'cobol-hello',
        cat: 'cobol',
        icon: 'CB',
        title: 'COBOL Hello World',
        difficulty: 'intermediate',
        desc: 'Write, compile, and run a COBOL program on MVS.',
        steps: [
            {
                title: 'Create COBOL Source PDS',
                text: 'Allocate a PDS for COBOL source:',
                cmd: 'TSO ALLOCATE DATASET(\'HERC01.COBOL\') NEW SPACE(5,5) TRACKS RECFM(F,B) LRECL(80) BLKSIZE(3120) DSORG(PO) DIR(10)'
            },
            {
                title: 'Write COBOL Program',
                text: 'Edit HERC01.COBOL(HELLO) and enter this program (start in column 8):',
                cmd: '       IDENTIFICATION DIVISION.\n       PROGRAM-ID. HELLO.\n       ENVIRONMENT DIVISION.\n       DATA DIVISION.\n       PROCEDURE DIVISION.\n           DISPLAY \'HELLO FROM COBOL ON MVS 3.8j!\'\n           DISPLAY \'THE MAINFRAME IS ALIVE.\'\n           STOP RUN.',
                note: 'COBOL columns: 1-6 = sequence numbers (optional), 7 = indicator, 8-72 = code, 73-80 = identification.'
            },
            {
                title: 'Compile and Run JCL',
                text: 'Create this JCL member to compile and execute:',
                cmd: '//COBRUN  JOB (ACCT),\'COBOL RUN\',\n//        CLASS=A,MSGCLASS=A\n//COB     EXEC COBUCG\n//COB.SYSIN DD DSN=HERC01.COBOL(HELLO),DISP=SHR\n//GO.SYSPRINT DD SYSOUT=A\n//',
                note: '<b>COBUCG</b> = Compile, Link, Go. Check SYS2.PROCLIB for available COBOL procedures.'
            },
            {
                title: 'Check Output',
                text: 'View the job output at ISPF 3.8:',
                cmd: '=3.8',
                note: 'Look for your COBRUN job. The GO step output should show your DISPLAY messages.'
            }
        ]
    },

    // ── KICKS / CICS ──
    {
        id: 'kicks-start',
        cat: 'kicks',
        icon: 'KI',
        title: 'Starting KICKS (CICS)',
        difficulty: 'intermediate',
        desc: 'Launch the KICKS transaction processing system from TSO.',
        steps: [
            {
                title: 'What is KICKS?',
                text: 'KICKS is a CICS-compatible transaction processing system for MVS 3.8j. It\'s already installed on the kicks0.350 DASD volume. KICKS lets you run CICS applications, write COBOL/CICS programs, and learn transaction processing.',
                note: 'KICKS provides high source code compatibility with IBM CICS. Programs can be migrated between KICKS and CICS by recompiling.'
            },
            {
                title: 'Start KICKS from TSO',
                text: 'At the TSO READY prompt (press PF3 until you exit ISPF), enter:',
                cmd: 'EXEC \'KICKS.KICKSSYS.V1R5M0.CLIST(KICKS)\'',
                note: 'You\'ll see KICKS startup messages followed by the color banner screen. Press <b>Enter</b> to cycle colors.'
            },
            {
                title: 'KICKS Banner Screen',
                text: 'The KICKS banner screen updates periodically. From here you can run transactions. Press CLEAR to get a blank input screen, then type a transaction code:',
                cmd: 'KSGM    = Sign On to KICKS\nKSSF    = Sign Off (shutdown KICKS)\nKEDF    = KICKS Execution Diagnostic\nKCBR    = CICS Browse demo\nKCMN    = CICS Menu demo',
                note: 'Always shut down KICKS cleanly with <b>KSSF</b> before logging off TSO.'
            },
            {
                title: 'Return to TSO',
                text: 'To exit KICKS cleanly:',
                cmd: 'Press CLEAR\nType: KSSF\nPress ENTER',
                note: 'After KICKS shuts down, press <b>Enter</b> a couple times to get the READY prompt back. You may need to run <b>TIME</b> to resync the terminal.'
            }
        ]
    },
    {
        id: 'kicks-transactions',
        cat: 'kicks',
        icon: 'TX',
        title: 'KICKS Demo Transactions',
        difficulty: 'intermediate',
        desc: 'Explore the demo programs included with KICKS.',
        steps: [
            {
                title: 'Available Demo Programs',
                text: 'KICKS comes with several demo programs based on Murach\'s CICS textbook. Source code is in:',
                cmd: 'KICKS.KICKS.V1R5M0.COB     (COBOL source)\nKICKS.KICKS.V1R5M0.MAPSRC  (BMS map source)',
                note: 'Check the <b>$README</b> member in each PDS for an index of programs.'
            },
            {
                title: 'Browse Demo Sources',
                text: 'From ISPF 3.4, enter this dataset name to see all KICKS datasets:',
                cmd: 'KICKS'
            },
            {
                title: 'KICKS Configuration Tables',
                text: 'KICKS uses tables similar to CICS for configuration:',
                cmd: 'SIT = System Initialization Table\nPPT = Program Control Table\nPCT = Program/Transaction Control Table\nFCT = File Control Table\nDCT = Destination Control Table',
                note: 'Tables are assembled as load modules. Source is in KICKS.KICKSSYS.V1R5M0.TABSRC.'
            },
            {
                title: 'Compile a KICKS Program',
                text: 'To compile a COBOL/KICKS program, copy the procedures to SYS2.PROCLIB first:',
                cmd: 'KICKS.KICKSSYS.V1R5M0.PROCLIB contains:\n  KIKCOBCL = Compile COBOL for KICKS\n  KIKMPCL  = Assemble BMS mapsets',
                note: 'Copy these procs to <b>SYS2.PROCLIB</b> before using them in JCL.'
            }
        ]
    },
    {
        id: 'kicks-cobol',
        cat: 'kicks',
        icon: 'KC',
        title: 'Write a KICKS/CICS COBOL Program',
        difficulty: 'advanced',
        desc: 'Create a simple CICS-style COBOL program that runs under KICKS.',
        steps: [
            {
                title: 'Create Source Dataset',
                text: 'Allocate a PDS for your KICKS COBOL source:',
                cmd: 'TSO ALLOCATE DATASET(\'HERC01.KICKS.COB\') NEW SPACE(5,5) TRACKS RECFM(F,B) LRECL(80) BLKSIZE(3120) DSORG(PO) DIR(10)'
            },
            {
                title: 'Write a Simple Program',
                text: 'Create member HELLO in HERC01.KICKS.COB:',
                cmd: '       IDENTIFICATION DIVISION.\n       PROGRAM-ID. HELLO.\n       DATA DIVISION.\n       WORKING-STORAGE SECTION.\n       01 WS-MSG    PIC X(40) VALUE\n          \'HELLO FROM KICKS/CICS!\'.\n       PROCEDURE DIVISION.\n           EXEC CICS SEND TEXT\n               FROM(WS-MSG)\n               LENGTH(40)\n               ERASE\n           END-EXEC.\n           EXEC CICS RETURN\n           END-EXEC.',
                note: 'This uses EXEC CICS commands — KICKS translates these at compile time into native calls.'
            },
            {
                title: 'Add to PCT Table',
                text: 'To run your program, you need to add a transaction code to the PCT (Program Control Table). The transaction maps to your program name.',
                note: 'Advanced: Edit the PCT source in KICKS.KICKSSYS.V1R5M0.TABSRC, add your entry, reassemble, and restart KICKS. See the KICKS documentation for details.'
            }
        ]
    },

    // ── Datasets ──
    {
        id: 'dataset-types',
        cat: 'datasets',
        icon: 'DS',
        title: 'Dataset Types & Organization',
        difficulty: 'beginner',
        desc: 'Understand the different types of MVS datasets.',
        steps: [
            {
                title: 'Sequential Datasets (PS)',
                text: 'A sequential (Physical Sequential) dataset is like a flat file:',
                cmd: 'DSORG=PS\nRecords stored sequentially\nAccessed start-to-end\nUsed for: JCL output, data files, logs',
                note: 'Think of it like a simple text file — one record after another.'
            },
            {
                title: 'Partitioned Datasets (PO)',
                text: 'A PDS is like a directory of members — the most common dataset type:',
                cmd: 'DSORG=PO\nContains named members (up to 8 chars)\nEach member is like a separate file\nUsed for: source code, JCL, procs, CLISTs',
                note: 'Example: <b>SYS1.PROCLIB(IEBGENER)</b> — IEBGENER is a member of the PDS SYS1.PROCLIB.'
            },
            {
                title: 'VSAM Datasets',
                text: 'VSAM (Virtual Storage Access Method) provides keyed and indexed access:',
                cmd: 'KSDS = Key-Sequenced (like indexed DB table)\nESDS = Entry-Sequenced (append-only log)\nRRDS = Relative Record (by number)\nLDS  = Linear (raw byte stream)',
                note: 'VSAM is defined with IDCAMS utility, not standard allocation.'
            },
            {
                title: 'Record Formats',
                text: 'Every dataset has a record format (RECFM):',
                cmd: 'F   = Fixed length records\nFB  = Fixed Blocked (most common for source)\nV   = Variable length records\nVB  = Variable Blocked\nU   = Undefined (load modules)\n\nLRECL  = Logical Record Length (e.g., 80)\nBLKSIZE = Physical Block Size (e.g., 3120)',
                note: '<b>RECFM=FB,LRECL=80</b> is the standard for source code, JCL, and CLISTs.'
            }
        ]
    },

    // ── Utilities ──
    {
        id: 'iebgener',
        cat: 'utilities',
        icon: 'IG',
        title: 'IEBGENER — Copy Utility',
        difficulty: 'beginner',
        desc: 'Copy datasets and generate output using the IEBGENER utility.',
        steps: [
            {
                title: 'Simple Copy',
                text: 'Copy one sequential dataset to another:',
                cmd: '//COPYJOB JOB (ACCT),\'COPY\',CLASS=A,MSGCLASS=A\n//STEP1   EXEC PGM=IEBGENER\n//SYSPRINT DD SYSOUT=A\n//SYSIN    DD DUMMY\n//SYSUT1   DD DSN=HERC01.SOURCE,DISP=SHR\n//SYSUT2   DD DSN=HERC01.TARGET,DISP=(NEW,CATLG),\n//         SPACE=(TRK,(5,5)),DCB=(RECFM=FB,LRECL=80,BLKSIZE=3120)\n//'
            },
            {
                title: 'Print to SYSOUT',
                text: 'Print a dataset to JES output:',
                cmd: '//PRINT   JOB (ACCT),\'PRINT\',CLASS=A,MSGCLASS=A\n//STEP1   EXEC PGM=IEBGENER\n//SYSPRINT DD SYSOUT=A\n//SYSIN    DD DUMMY\n//SYSUT1   DD DSN=HERC01.MYDATA,DISP=SHR\n//SYSUT2   DD SYSOUT=A\n//'
            }
        ]
    },
    {
        id: 'iebcopy',
        cat: 'utilities',
        icon: 'IC',
        title: 'IEBCOPY — PDS Copy',
        difficulty: 'intermediate',
        desc: 'Copy members between Partitioned Datasets using IEBCOPY.',
        steps: [
            {
                title: 'Copy Entire PDS',
                text: 'Copy all members from one PDS to another:',

// ── Render ──
const grid = document.getElementById('tutGrid');
const filters = document.getElementById('tutFilters');
let activeFilter = 'all';

function copyCmd(btn, text) {
    navigator.clipboard.writeText(text).then(() => {
        btn.textContent = 'OK';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'COPY'; btn.classList.remove('copied'); }, 1200);
    }).catch(() => {
        // Fallback
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        btn.textContent = 'OK';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'COPY'; btn.classList.remove('copied'); }, 1200);
    });
}

function toggleStep(stepEl) {
    const body = stepEl.querySelector('.tut-step-body');
    const toggle = stepEl.querySelector('.tut-step-toggle');
    body.classList.toggle('open');
    toggle.classList.toggle('open');
}

function renderTutorials() {
    const filtered = activeFilter === 'all' ? TUTORIALS : TUTORIALS.filter(t => t.cat === activeFilter);

    if (!filtered.length) {
        grid.innerHTML = '<div style="padding:40px; color:#666; text-align:center;">No tutorials in this category yet.</div>';
        return;
    }

    grid.innerHTML = filtered.map(tut => {
        const diffClass = `tut-badge-${tut.difficulty}`;
        const stepsHtml = tut.steps.map((s, i) => {
            let bodyContent = '';
            if (s.text) bodyContent += `<div class="tut-step-text">${s.text}</div>`;
            if (s.cmd) bodyContent += `<div class="tut-cmd">${escHtml(s.cmd)}<button class="tut-cmd-copy" onclick="event.stopPropagation(); copyCmd(this, ${escAttr(s.cmd)})">COPY</button></div>`;
            if (s.note) bodyContent += `<div class="tut-note">${s.note}</div>`;

            return `
            <div class="tut-step" onclick="toggleStep(this)">
                <div class="tut-step-header">
                    <span class="tut-step-num">${i + 1}</span>
                    <span class="tut-step-title">${s.title}</span>
                    <span class="tut-step-toggle">&#9654;</span>
                </div>
                <div class="tut-step-body">${bodyContent}</div>
            </div>`;
        }).join('');

        return `
        <div class="tut-card" data-cat="${tut.cat}">
            <div class="tut-card-header">
                <div class="tut-card-icon">${tut.icon}</div>
                <div class="tut-card-meta">
                    <div class="tut-card-title">${tut.title}</div>
                    <div class="tut-card-cat">${tut.cat.replace('-', ' ')}</div>
                </div>
                <div class="tut-card-badges">
                    <span class="tut-badge ${diffClass}">${tut.difficulty}</span>
                </div>
            </div>
            <div class="tut-card-desc">${tut.desc}</div>
            <div class="tut-card-steps">${stepsHtml}</div>
        </div>`;
    }).join('');
}

function escHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function escAttr(str) {
    return JSON.stringify(str).replace(/'/g, "\\'");
}

// Filter clicks
filters.addEventListener('click', e => {
    const btn = e.target.closest('.tut-filter');
    if (!btn) return;
    filters.querySelectorAll('.tut-filter').forEach(f => f.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.cat;
    renderTutorials();
});

renderTutorials();
</script>
