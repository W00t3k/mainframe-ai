<header class="app-header">
    <a href="/" class="home-btn" title="Home">
        <img src="/static/img/ibm-logo-official.svg" alt="IBM" class="ibm-logo">
    </a>
    <div class="header-title">{{ brand_title }}</div>
    <nav class="header-nav">
        {% for item in nav_items %}
            <a href="{{ item.href }}" class="{% if item.active %}active{% endif %}">{{ item.label }}</a>
        {% endfor %}
    </nav>
</header>
